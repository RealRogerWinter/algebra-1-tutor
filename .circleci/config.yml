version: 2.1
jobs:
  gates:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install deps
          command: pip install -r requirements.txt
      - run:
          name: Answer-key verifier (sympy)
          command: python _verification/verify_answers.py
      - run:
          name: Complementary problem verifier (sympy)
          command: python _verification/verify_complementary.py
      - run:
          name: SSOT generation up to date
          command: python _verification/generate.py --check
      - run:
          name: Alignment guard (alignment + notation + point-on-line + code-grammar + md-anchor + figure)
          command: python _verification/check_alignment.py
      - run:
          name: Figures accurate + current
          command: python _verification/figures.py --check
      - run:
          name: HTML textbook up to date
          command: python _verification/build_textbook.py --check
      - run:
          name: Tutor guide up to date
          command: python _verification/build_tutor_guide.py --check
      - run:
          name: Skill package up to date
          command: python _verification/build_skill.py --check
      - run:
          name: Student guide up to date
          command: python _verification/build_student_guide.py --check
      - run:
          name: Landing page up to date
          command: python _verification/build_landing.py --check
      - run:
          name: Integration smoke test (cross-material alignment + code resolution)
          command: python _verification/smoke_test.py
      - run:
          name: Unit tests
          command: python -m pytest _verification/tests -v
workflows:
  phase-0-gates:
    jobs:
      - gates
